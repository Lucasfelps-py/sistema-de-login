<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Login</h1>

    {% if erro %}
        <div class="erro">
            {{ erro }}
        </div>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="usuario"
            placeholder="Digite o usuário"
            required
        >

        <input
            type="password"
            name="senha"
            placeholder="Digite a senha"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <a href="{{ url_for('index') }}">
        Voltar ao início
    </a>

</div>

</body>
</html>
